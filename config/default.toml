# predator-prey-evolution-communication default configuration

seed = 42

[world]
width = 80
height = 60
food_density = 0.15
food_energy = 20.0
food_regrow_ticks = 50
terrain_tree_pct = 0.10
terrain_rock_pct = 0.05
terrain_water_pct = 0.05
terrain_bush_pct = 0.08

[prey]
initial_count = 150
initial_energy = 100.0
max_energy = 200.0
energy_per_tick = 0.5
move_energy_cost = 1.0
signal_energy_cost = 3.0
reproduce_energy_cost = 60.0
reproduce_energy_threshold = 120.0
vision_range = 8
vision_angle = 60.0
hearing_range = 12

[predators]
aerial_count = 2
ground_count = 3
pack_count = 4
aerial_speed = 3
ground_speed = 1
pack_speed = 2
aerial_vision = 15
ground_vision = 4
pack_vision = 10
attack_cooldown = 30
kill_radius = 1

[neat]
population_size = 150
c1_excess = 1.0
c2_disjoint = 1.0
c3_weight = 0.4
compatibility_threshold = 3.0
weight_mutate_rate = 0.8
weight_perturb_rate = 0.9
weight_perturb_strength = 0.5
add_node_rate = 0.03
add_connection_rate = 0.05
disable_gene_rate = 0.01
interspecies_mate_rate = 0.001
stagnation_limit = 15
elitism_count = 2
survival_rate = 0.2

[signal]
vocab_size = 8
signal_range = 12
signal_decay_rate = 0.3
signal_lifetime = 3

[evolution]
generation_ticks = 2000
max_generations = 1000
min_prey_alive = 5
fitness_survival_weight = 1.0
fitness_energy_weight = 0.3
fitness_offspring_weight = 2.0
fitness_kin_bonus = 0.5
