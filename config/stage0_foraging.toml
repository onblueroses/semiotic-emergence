# Stage 0: Pure foraging - no predators, no terrain, free signals
# Goal: validate NEAT implementation, evolve reliable food-seeking
# Success: food_eaten/alive > 3 by gen 50, survival rate > 60% by gen 50
# Next: stage1_evasion.toml when survival > 70% for 10 consecutive gens

seed = 42

[world]
width = 40
height = 30
food_density = 0.25         # 300 food items - generous, reduces starvation noise
food_energy = 25.0          # One item = meaningful energy gain
food_regrow_ticks = 30      # Fast regrowth - food is abundant
terrain_tree_pct = 0.0      # Flat terrain for Stage 0
terrain_rock_pct = 0.0
terrain_water_pct = 0.0
terrain_bush_pct = 0.0

[prey]
initial_count = 100
initial_energy = 100.0
max_energy = 200.0
energy_per_tick = 0.4       # Slightly slower drain than default
move_energy_cost = 0.8      # Slightly cheaper to move - reward exploration
signal_energy_cost = 0.0    # FREE signals in Stage 0 (architecture present, cost deferred)
vision_range = 6
vision_angle = 60.0
hearing_range = 10

[predators]
aerial_count = 0
ground_count = 0
pack_count = 0
aerial_speed = 3
ground_speed = 1
pack_speed = 2
aerial_vision = 15
ground_vision = 4
pack_vision = 10
attack_cooldown = 30
kill_radius = 1

[neat]
population_size = 100       # Match prey.initial_count
c1_excess = 1.0
c2_disjoint = 1.0
c3_weight = 0.4
compatibility_threshold = 3.0
weight_mutate_rate = 0.8
weight_perturb_rate = 0.9
weight_perturb_strength = 0.5
add_node_rate = 0.03
add_connection_rate = 0.05
bias_mutate_rate = 0.7
disable_gene_rate = 0.01
interspecies_mate_rate = 0.001
stagnation_limit = 20
elitism_count = 2
survival_rate = 0.2

[signal]
vocab_size = 8              # Keep signal neurons from gen 0 (avoid architecture change later)
signal_range = 10
signal_decay_rate = 0.3
signal_lifetime = 3

[evolution]
generation_ticks = 500      # Short gens - food seeking doesn't need 2000
max_generations = 200       # Should see food-seeking by gen 50
min_prey_alive = 5
fitness_survival_weight = 1.0
fitness_energy_weight = 0.3
fitness_kin_bonus = 0.0     # No kin bonus in Stage 0
kin_relatedness_generations = 0

[stats]
export_every_n_generations = 5
export_format = "csv"
export_path = "output/stage0/"
track_signals = false       # No point tracking signals yet
track_lineage = false
stats_interval = 1
