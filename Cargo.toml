[package]
name = "predator-prey-evolution-communication"
version = "0.1.0"
edition = "2024"
description = "Evolutionary simulation where prey agents evolve emergent communication through NEAT neuroevolution"
license = "MIT"
repository = "https://github.com/onblueroses/predator-prey-evolution-communication"
keywords = ["evolution", "neat", "emergent-communication", "simulation", "artificial-life"]
categories = ["simulation", "science"]

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
rand = "0.8"
rand_chacha = "0.3"
clap = { version = "4", features = ["derive"] }
bincode = "1"

[dependencies.crossterm]
version = "0.28"
optional = true

[features]
default = ["terminal-viz"]
terminal-viz = ["dep:crossterm"]

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "simulation"
harness = false

[profile.release]
opt-level = 3
lto = true

[profile.dev]
opt-level = 1  # Faster iteration without full optimization

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
panic_in_result_fn = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
allow_attributes = "deny"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_possible_wrap = "allow"

[lints.rust]
missing_debug_implementations = "warn"

[package.metadata.cargo-machete]
ignored = ["crossterm", "bincode"]

[dev-dependencies.cargo-husky]
version = "1"
default-features = false
features = ["precommit-hook", "user-hooks"]
